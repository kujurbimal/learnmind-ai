name: AI Content Pipeline

on:
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand name'
        required: false
        default: 'LearnMind.AI'
      audience:
        description: 'Target audience'
        required: false
        default: 'K-12 students and parents'
      tone:
        description: 'Copy tone'
        required: false
        default: 'motivational and urgent'
      sections:
        description: 'Sections to regenerate'
        required: false
        default: 'all'
  schedule:
    - cron: '0 9 * * 1'
  push:
    paths:
      - 'content-config.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate content
        run: cd scripts && node generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND: ${{ inputs.brand }}
          AUDIENCE: ${{ inputs.audience }}
          TONE: ${{ inputs.tone }}
          SECTIONS: ${{ inputs.sections }}

      - name: Commit and push
        run: |
          git config user.email "bot@learnmind.ai"
          git config user.name "AI Pipeline Bot"
          git add index.html content/ || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "AI pipeline content update"
          git push
